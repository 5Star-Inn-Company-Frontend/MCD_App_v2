    - assets/icons/
    - assets/lottie/
    - assets/images/betting/
    - assets/images/cable/
    - assets/images/electricity/
    - assets/images/history/
    - assets/images/virtual_card/
    - assets/images/reward_centre/
    - assets/images/epin/
    - assets/images/receipts_bg/
    - assets/icons/receipts/

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
        - asset: assets/fonts/Manrope-Bold.ttf
        - asset: assets/fonts/Manrope-Medium.ttf
        - asset: assets/fonts/Manrope-SemiBold.ttf
